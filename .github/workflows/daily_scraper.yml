name: Daily LinkedIn Job Scraper

on:
  schedule:
    # Runs every day at 8:00 AM IST (02:30 UTC) and 6:34 PM IST (13:04 UTC).
    # Cron times are in UTC: 02:30 and 13:04 respectively.
    # Temporary test schedule: run every 5 minutes for verification (remove after test)
    # Refresh commit applied to trigger GitHub schedule registration.    
    # - cron: '*/5 * * * *' # Removed the test schedule trigger
    - cron: '30 2 * * *'
    - cron: '4 13 * * *'
  workflow_dispatch: # Allows you to also trigger the script manually from the GitHub website

jobs:
  scrape_and_email:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # Speeds up subsequent workflow runs

    - name: Install Google Chrome & Dependencies
      run: |
        if ! command -v google-chrome >/dev/null; then
          sudo apt-get update
          sudo apt-get install -y wget unzip gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo tee /usr/share/keyrings/google-linux-signing-keyring.gpg >/dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux-signing-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
        else
          google-chrome --version
        fi

    - name: Install Python Package Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium beautifulsoup4 openpyxl python-dotenv

    - name: Run Job Automation Script
      env:
        # Securely inject variables from GitHub Secrets directly into your script environment
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        SMTP_SERVER: "smtp.gmail.com"
        SMTP_PORT: "587"
      run: |
        # Run in headless mode since GitHub servers don't have a monitor attached
        python -B jobagent.py

